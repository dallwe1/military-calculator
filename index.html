<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전역일 계산기</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f5f7fa);
    text-align:center;
    padding:40px;
    color:#1f2937;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
    color:#111827;
    margin-bottom:10px;
}

nav{
    margin-bottom:20px;
}

nav a{
    text-decoration:none;
    color:#2563eb;
    margin:0 6px;
    font-weight:500;
}

nav a:hover{
    text-decoration:underline;
}

input, select, button{
    width:100%;
    padding:14px;
    margin-top:12px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    box-sizing:border-box;
}

input:focus, select:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

button{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 15px rgba(37,99,235,0.25);
}

.result{
    margin-top:25px;
    font-size:26px;
    font-weight:bold;
    padding:15px;
    background:#f3f4f6;
    border-radius:12px;
}

.sub{
    margin-top:8px;
    color:#6b7280;
    font-size:14px;
}

/* progress */
.progress-wrap{
    margin-top:20px;
}

.bar-bg{
    width:100%;
    height:25px;
    background:#e5e7eb;
    border-radius:20px;
    overflow:hidden;
}

.bar-fill{
    width:0%;
    height:100%;
    background:#2563eb;
    transition:0.5s;
}
</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<nav>
  <a href="index.html">전역일 계산기</a>
  <a href="saving.html">군 적금 계산기</a>
  <a href="about.html">사이트 소개</a>
  <a href="privacy.html">개인정보처리방침</a>
</nav>

<h1>🎖 전역일 계산기</h1>

<p>복무 유형 선택</p>

<select id="serviceType">
    <option value="18">육군 (18개월)</option>
    <option value="20">해군 (20개월)</option>
    <option value="21">공군 (21개월)</option>
    <option value="21">사회복무요원 (21개월)</option>
</select>

<p>입대일 / 소집일 선택</p>

<input type="date" id="enlistDate">

<button onclick="calculateDischarge()">전역일 계산하기</button>

<div class="result" id="result"></div>
<div class="sub" id="remaining"></div>
<div class="sub" id="served"></div>

<div class="progress-wrap">
  <div class="bar-bg">
    <div id="progressBar" class="bar-fill"></div>
  </div>
  <p id="progressText"></p>
</div>

<!-- 문의하기 -->
<section id="contact" style="margin-top:60px;">
  <h2>문의하기</h2>

  <form action="https://formspree.io/f/mqeognew" method="POST">

    <input type="email" name="email" placeholder="이메일 (답장 원할 경우 입력)">

    <textarea name="message" placeholder="불편한 점 / 개선 의견 / 버그 신고" required></textarea>

    <button type="submit">보내기</button>

  </form>

  <p style="font-size:12px; color:gray;">
    * 익명 문의 가능 / 답장을 원하면 이메일 입력
  </p>
</section>

</div>

<script>
function calculateDischarge(){

    const enlistInput = document.getElementById("enlistDate").value;

    if(!enlistInput){
        alert("날짜를 선택해주세요.");
        return;
    }

    const months = parseInt(document.getElementById("serviceType").value);

    const enlistDate = new Date(enlistInput);
    const dischargeDate = new Date(enlistDate);

    dischargeDate.setMonth(dischargeDate.getMonth() + months);

    document.getElementById("result").innerHTML =
        "예상 전역일 : " +
        dischargeDate.toLocaleDateString("ko-KR");

    const today = new Date();

    const diff = dischargeDate - today;
    const remain = Math.ceil(diff / (1000*60*60*24));

    const totalDays = Math.ceil((dischargeDate - enlistDate) / (1000*60*60*24));
    const servedDays = Math.ceil((today - enlistDate) / (1000*60*60*24));

    document.getElementById("served").innerHTML =
        "복무한 기간 : " + servedDays + "일";

    let progress = Math.floor((servedDays / totalDays) * 100);

    if(progress < 0) progress = 0;
    if(progress > 100) progress = 100;

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("progressText").innerHTML =
        "복무 진행률 : " + progress + "%";

    if(remain > 0){
        document.getElementById("remaining").innerHTML =
            "남은 기간 : " + remain + "일";
    } else {
        document.getElementById("remaining").innerHTML =
            "전역일이 지났습니다.";
    }
}
</script>

</body>
</html>
